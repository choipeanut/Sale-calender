<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sale Calendar APK</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <main id="view-root" class="view-root" aria-live="polite"></main>
    </div>

    <dialog id="shop-dialog" class="sheet-dialog">
      <article id="shop-dialog-content"></article>
      <div class="dialog-actions">
        <button class="ghost" value="cancel">닫기</button>
        <button type="button" data-action="save-shop-selection">샵 선택 저장</button>
      </div>
    </dialog>

    <dialog id="detail-modal" class="detail-modal">
      <article id="detail-content"></article>
      <div class="dialog-actions">
        <button class="ghost" value="cancel">닫기</button>
      </div>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
