<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sale Calendar APK</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: "Noto Sans KR", system-ui, sans-serif;
        background: linear-gradient(180deg, #f0f9ff, #ecfeff 45%, #f8fafc);
        color: #0f172a;
      }
      .wrap { max-width: 560px; margin: 0 auto; padding: 24px 16px 40px; }
      .card {
        background: #fff;
        border-radius: 18px;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
        padding: 20px;
        border: 1px solid #e2e8f0;
      }
      h1 { margin: 0 0 8px; font-size: 26px; }
      p { margin: 8px 0; line-height: 1.6; }
      .pill {
        display: inline-block;
        margin-top: 10px;
        padding: 6px 10px;
        border-radius: 9999px;
        background: #dbeafe;
        color: #1d4ed8;
        font-weight: 700;
        font-size: 12px;
      }
      .section {
        margin-top: 16px;
        padding: 14px;
        border-radius: 12px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
      }
      ul { padding-left: 18px; margin: 8px 0; }
      .small { font-size: 13px; color: #475569; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>Sale Calendar</h1>
        <p>국내 주요 할인 행사 캘린더 Android APK 빌드입니다.</p>
        <span class="pill">APK Wrapper Build</span>

        <div class="section">
          <strong>포함 목적</strong>
          <p class="small">프로젝트의 Android 설치형 실행 파일 생성 및 배포 확인용.</p>
        </div>

        <div class="section">
          <strong>핵심 기능 범위(현재 APK)</strong>
          <ul>
            <li>Android 설치/실행 가능</li>
            <li>프로젝트 브랜딩/기본 안내 화면 제공</li>
            <li>PWA/웹 기능 확장용 Capacitor Android 기반</li>
          </ul>
        </div>

        <p class="small">Generated at: <span id="ts"></span></p>
      </div>
    </div>

    <script>
      document.getElementById("ts").textContent = new Date().toLocaleString("ko-KR", {
        timeZone: "Asia/Seoul",
      });
    </script>
  </body>
</html>
